services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: rabitah
      POSTGRES_USER: rabitah
      POSTGRES_PASSWORD: rabitah
    ports:
      - "5432:5432"
    volumes:
      - rabitah-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rabitah"]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  rabitah-postgres:
